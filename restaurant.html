<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Restoran - Pondok Senaru</title>
    <style>
        :root {
            --primary-color: #d97706;
            --secondary-color: #003580;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --border-color: #cbd5e1;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-body); color: var(--text-main); padding: 15px; }
        
        .header { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: var(--primary-color); font-size: 1.3rem; }
        .btn-back { background: var(--secondary-color); color: white; text-decoration: none; padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; }

        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { .grid-layout { grid-template-columns: 1fr 1fr; } }

        .card { background: white; border-radius: 12px; border: 1px solid var(--border-color); padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .card-title { font-size: 1rem; color: var(--secondary-color); font-weight: bold; margin-bottom: 12px; border-bottom: 2px solid #f1f5f9; padding-bottom: 6px; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; color: #475569; }
        .form-control { width: 100%; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 6px; outline: none; font-size: 0.9rem; }
        
        .menu-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn-add-item { background: #2ea44f; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; }
        .btn-remove { background: #e63946; color: white; border: none; padding: 0 10px; border-radius: 6px; cursor: pointer; }

        .checkbox-container { display: flex; gap: 15px; margin-bottom: 10px; padding: 5px 0; }
        .checkbox-item { display: flex; align-items: center; gap: 5px; font-size: 0.85rem; font-weight: bold; color: #475569; cursor: pointer; }

        .kalkulasi-box { background: #fffbeb; border: 1px solid #fef3c7; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 0.85rem; }
        .kalkulasi-item { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .grand-total { font-weight: bold; font-size: 1rem; color: #b45309; border-top: 1px dashed #d97706; padding-top: 4px; margin-top: 4px; }

        .btn-submit { background: var(--primary-color); color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        
        /* Gaya Item List Diperbaiki */
        .order-list-item { 
            border-left: 4px solid var(--primary-color); 
            background: #fdfdfd; 
            padding: 10px 90px 10px 10px; 
            border-radius: 0 8px 8px 0; 
            margin-bottom: 8px; 
            border: 1px solid #f1f5f9; 
            position: relative; 
        }
        
        .order-list-content {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            width: 100%;
        }

        .total-display {
            color: #b45309; 
            white-space: nowrap; 
            font-weight: bold;
            font-size: 0.95rem;
            margin-left: 10px;
        }
        
        .action-buttons { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .btn-opt { padding: 4px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: bold; cursor: pointer; border: 1px solid #cbd5e1; }
        .btn-print { background: #e0f2fe; color: #0369a1; border-color: #7dd3fc; }
        .btn-delete { background: #fee2e2; color: #ef4444; border-color: #fca5a5; }

        #printArea { display: none; }

        @media print {
            @page { size: A4; margin: 15mm 12mm; }
            body { background: white !important; color: #1e293b !important; padding: 0 !important; margin: 0 !important; font-family: 'Segoe UI', sans-serif !important; font-size: 11pt !important; }
            .header, .grid-layout, .action-buttons, button, script { display: none !important; }
            #printArea { display: block !important; width: 100%; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>🍽️ Kasir Restoran (Mandiri)</h1>
    </div>
    <a href="index.html" class="btn-back">◀ Ke Kalender</a>
</div>

<div class="grid-layout">
    <div class="card">
        <div class="card-title">📝 Input Transaksi Baru</div>
        <div class="form-group">
            <label>TANGGAL TRANSAKSI</label>
            <input type="date" id="orderDate" class="form-control" onchange="loadOrdersAndActiveRooms()">
        </div>
        <div class="form-group">
            <label>STATUS PEMBAYARAN KULINER</label>
            <select id="paymentStatus" class="form-control" onchange="toggleRoomSelector()">
                <option value="paid">Lunas</option>
                <option value="unpaid">Hutang</option>
                <option value="charge_room">🧹 Cas ke Kamar</option>
            </select>
        </div>
        <div class="form-group" id="roomSelectContainer" style="display: none; background: #f0fdf4; padding: 10px; border-radius: 6px; border: 1px solid #bbf7d0;">
            <label style="color: #166534;">PILIH KAMAR</label>
            <select id="activeRoomKey" class="form-control" onchange="autoFillTamuDariKamar()"></select>
        </div>
        <div class="form-group">
            <label>NOMOR KAMAR / MEJA</label>
            <input type="text" id="roomOrTable" class="form-control" placeholder="Contoh: Kamar 01">
        </div>
        <div class="form-group">
            <label>NAMA TAMU / PELANGGAN</label>
            <input type="text" id="guestName" class="form-control" placeholder="Nama tamu">
        </div>
        <div class="form-group">
            <label>MENU KULINER</label>
            <div id="menuItemsContainer"></div>
            <button type="button" class="btn-add-item" onclick="addMenuRow()">➕ Tambah Menu</button>
        </div>
        <div class="checkbox-container">
            <label class="checkbox-item"><input type="checkbox" id="includeService" checked onchange="hitungOtimatis()"> Service (5%)</label>
            <label class="checkbox-item"><input type="checkbox" id="includeTax" checked onchange="hitungOtimatis()"> Tax (10%)</label>
        </div>
        <div class="kalkulasi-box">
            <div class="kalkulasi-item"><span>Subtotal:</span> <span id="textSubtotal">Rp 0</span></div>
            <div class="kalkulasi-item"><span>Service:</span> <span id="textService">Rp 0</span></div>
            <div class="kalkulasi-item"><span>Tax:</span> <span id="textTax">Rp 0</span></div>
            <div class="kalkulasi-item grand-total"><span>Total:</span> <span id="textGrandTotal">Rp 0</span></div>
        </div>
        <button class="btn-submit" onclick="simpanBonRestoran()">💾 Simpan & Cetak</button>
    </div>

    <div class="card">
        <div class="card-title">📊 Penjualan Hari Ini</div>
        <div id="listOrderHariIni"></div>
    </div>
</div>

<div id="printArea"></div>

<script>
    const FIREBASE_URL = "https://kalender-8a7b2-default-rtdb.firebaseio.com/";
    
    function loadOrdersByDate() {
        const dateStr = document.getElementById('orderDate').value;
        const container = document.getElementById('listOrderHariIni');
        if(!dateStr) return;

        fetch(`${FIREBASE_URL}standalone_restaurant_orders/${dateStr}.json`)
        .then(res => res.json())
        .then(data => {
            if(!data) { container.innerHTML = "Belum ada data."; return; }

            let html = "";
            Object.keys(data).forEach(key => {
                let order = data[key];
                html += `
                    <div class="order-list-item">
                        <div class="action-buttons">
                            <button class="btn-opt btn-print" onclick="cetakStrukNota('${dateStr}', '${key}')">🖨️</button>
                            <button class="btn-opt btn-delete" onclick="hapusBonMurni('${dateStr}', '${key}')">🗑️</button>
                        </div>
                        <div class="order-list-content">
                            <span style="color:#003580; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:bold;">
                                📍 ${order.lokasi} - ${order.tamu}
                            </span>
                            <span class="total-display">
                                Rp ${order.grandTotal.toLocaleString('id-ID')}
                            </span>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        });
    }

    window.onload = () => { loadOrdersAndActiveRooms(); };
</script>
</body>
</html>
